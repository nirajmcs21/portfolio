<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Let's Collaborate</title>
    <link rel="stylesheet" href="contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section class="contact-section">
        <div class="contact-header">
            <h1>LET’S SOLVE YOUR <span>CONTENT PROBLEM</span></h1>
        </div>

        <div class="contact-container">
            <form class="contact-form">
                <h2>Contact Me</h2>
                
                <div class="input-group">
                    <label>Name*</label>
                    <input type="text" placeholder="Your Name" required>
                </div>

                <div class="input-group">
                    <label>Email*</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>

                <div class="input-group">
                    <label>What are you looking for?*</label>
                    <textarea rows="4" placeholder="Briefly describe your project..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
                <p class="form-note">I'll get back to you within 24 hours.</p>
            </form>

            <div class="social-sidebar">
                <a href="mailto:swapnilbaranwal31@gmail.com?subject=Project Inquiry from Portfolio" class="social-tile email">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Email Me</span>
                </a>
                <a href="#" class="social-tile instagram">
                    <i class="fa-brands fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://www.linkedin.com/in/swapnil-baranwal-0b380b240?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" class="social-tile linkedin">
                    <i class="fa-brands fa-linkedin-in"></i>
                    <span>LinkedIn</span>
                </a>
            </div>
        </div>
    </section>

</body>
</html>
